<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <link href="style.css" rel="stylesheet">
    <script defer src="javascriptFile.js"></script>
</head>
<body>
    <div class="allButtons">
        <input type="text" id="display" readonly="enabled">
        <div class="firstRowButtons">
            <button id="seven">7</button>
            <button id="eight">8</button>
            <button id="nine">9</button>
            <button id="/">÷</button>
            
        </div>

        <div class="secondRowButtons">
            <button id="four">4</button>
            <button id="five">5</button>
            <button id="six">6</button>
            <button id="*">x</button>
        </div>

        <div class="thirdRowButtons">
            <button id="one">1</button>
            <button id="two">2</button>
            <button id="three">3</button>
            <button id="-">-</button>
        </div>

        <div class="fourthRowButtons">
            <button id="zero">0</button>
            <button id=".">.</button>
            <button id="clear">C</button>
            <button id="+">+</button>
        </div>

        <div class="lastRowButton">
            <button id="calculate">=</button>
        </div>
    </div>
</body>
</html>
